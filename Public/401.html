<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>401 - Session expirée</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        
        .error-code {
            font-size: 120px;
            font-weight: 800;
            color: #A43E2A;
            line-height: 1;
            margin-bottom: 10px;
        }
        
        .error-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .error-message {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #004732;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }
        
        .btn:hover {
            background: #006644;
        }
        
        .btn i {
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">401</div>
        <div class="error-title">Session expirée</div>
        <div class="error-message">Votre session a expiré. Veuillez vous reconnecter.</div>
        <a href="/login" class="btn">
            <i class="fas fa-sign-in-alt"></i>
            Se reconnecter
        </a>
    </div>
</body>
</html>
